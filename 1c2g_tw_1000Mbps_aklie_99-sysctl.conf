# 改进的FQ_Codel队列管理（解决单线程断流）
net.core.default_qdisc = fq_codel
net.core.fq_codel.target = 10ms          # 目标延迟，略高于RTT的1/3，减少不必要丢包
net.core.fq_codel.interval = 150ms       # 调整间隔，适应跨区域链路波动
net.core.fq_codel.quantum = 1514         # 量子值设为MTU大小，优化单流处理
net.core.fq_codel.limit = 1000           # 队列限制，防止过度缓冲

# 基础网络参数调整
net.core.rmem_max = 33554432             # 增大最大接收缓冲区至32MB
net.core.wmem_max = 33554432             # 增大最大发送缓冲区至32MB
net.core.rmem_default = 8388608          # 提高默认缓冲区，适应突发流量
net.core.wmem_default = 8388608
net.core.netdev_max_backlog = 20000      # 增加接收队列，应对链路波动

# TCP重传与容错优化（关键解决断流）
net.ipv4.tcp_retries2 = 12               # 增加最大重传次数（默认15，适度降低避免无意义重试）
net.ipv4.tcp_orphan_retries = 3          # 孤儿套接字重传次数
net.ipv4.tcp_slow_start_after_idle = 0   # 保持空闲后的拥塞窗口
net.ipv4.tcp_probe_threshold = 8         # 更早触发BBR的带宽探测
net.ipv4.tcp_probe_interval = 100ms      # 更频繁的带宽探测

# 单线程传输优化
net.ipv4.tcp_no_metrics_save = 0         # 保存连接 metrics，优化后续传输
net.ipv4.tcp_sack = 1                    # 增强选择性确认，减少重传量
net.ipv4.tcp_fack = 1
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_moderate_rcvbuf = 1

# 缓冲区动态调整
net.ipv4.tcp_rmem = 4096 8388608 33554432
net.ipv4.tcp_wmem = 4096 8388608 33554432
net.ipv4.tcp_mem = 1048576 2097152 4194304  # 降低内存压力，避免OOM导致的断流

# 连接稳定性增强
net.ipv4.tcp_keepalive_time = 300        # 更频繁的保活探测
net.ipv4.tcp_keepalive_intvl = 20
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.tcp_fin_timeout = 20            # 适当延长FIN等待，避免过早关闭
    
